name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "test", "dev" ]
  pull_request:
    branches: [ "main", "test", "dev" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: app/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: app

    - name: Lint
      run: npm run lint
      working-directory: app

    - name: Typecheck
      run: npm run check
      working-directory: app

    - name: Test
      run: npm run test -- --run
      working-directory: app

    - name: Build
      run: npm run build
      working-directory: app

    - name: Build Docker image
      run: docker build -t gitops-project:ci .

    - name: Setup Kustomize
      uses: imranismail/setup-kustomize@v2

    - name: Validate Kubernetes manifests
      run: |
        kustomize build k8s/base > /dev/null
        kustomize build k8s/overlays/dev > /dev/null
        kustomize build k8s/overlays/test > /dev/null
        kustomize build k8s/overlays/prod > /dev/null

  publish-image:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set image tag from branch
      id: vars
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          echo "tag=latest" >> "$GITHUB_OUTPUT"
        elif [ "${{ github.ref_name }}" = "test" ]; then
          echo "tag=test-latest" >> "$GITHUB_OUTPUT"
        else
          echo "tag=dev-latest" >> "$GITHUB_OUTPUT"
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-project:${{ steps.vars.outputs.tag }}