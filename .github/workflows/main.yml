name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gitops-project:${{ github.ref == 'refs/heads/main' && 'latest' || 'dev-latest' }}

    # Paso opcional: Avisar a ArgoCD que hay cambios (opcional porque ArgoCD escanea cada 3 min)
    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}