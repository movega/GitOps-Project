apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: prod
patches:
  - target:
      kind: Deployment
      name: gitops-project
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: APP_ENV
            value: "ENTORNO DE PRODUCCIÓN (RAMA MAIN)"
