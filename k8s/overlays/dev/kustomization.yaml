apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: dev

images:
  - name: gitops-project
    newName: alvarovm95493/gitops-project
    newTag: latest # O 'dev-latest' si configuraste así la Action

patches:
  - target:
      kind: Deployment
      name: gitops-project
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: APP_ENV
            value: "ENTORNO DE DESARROLLO (RAMA DEV)"