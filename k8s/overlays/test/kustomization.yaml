apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: test
images:
- name: gitops-project
  newName: alvarovm95493/gitops-project
  newTag: test-8e1ee0d
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
    - op: add
      path: /spec/template/spec/containers/0/env
      value:
        - name: APP_ENV
          value: "ENTORNO DE PRUEBAS (RAMA TEST)"
  target:
    kind: Deployment
    name: gitops-project
