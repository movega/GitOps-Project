apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: test
images:
  - name: gitops-project
    newName: alvarovm95493/gitops-project
    newTag: test-latest
patches:
  - target:
      kind: Deployment
      name: gitops-project
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: APP_ENV
            value: "ENTORNO DE PRUEBAS (RAMA TEST)"
